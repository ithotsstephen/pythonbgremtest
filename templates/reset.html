<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset Password</title>
<style>body{font-family:system-ui,Arial,sans-serif;background:#f7f7f7}.card{max-width:420px;margin:40px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.08)}label{display:block;font-size:12px;color:#555}input{width:100%;padding:8px 10px;margin:6px 0 12px}button{padding:8px 12px}.msg{color:#c00;font-size:12px}</style>
</head><body>
{% include '_header.html' %}
{% include '_menu.html' %}
<div class="card">
  <h2>Reset password</h2>
  {% with messages = get_flashed_messages(category_filter=['error','info']) %}
    {% if messages %}<div class="msg">{{ messages[0] }}</div>{% endif %}
  {% endwith %}
  <form method="post">
    <label>New password</label>
    <input name="password" type="password" minlength="6" required>
    <button type="submit">Update password</button>
  </form>
</div>
</body></html>
