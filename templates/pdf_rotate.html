<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF Rotate</title>
<style>
  body{font-family:system-ui,Arial,sans-serif;background:#fff;margin:0}
  .wrap{max-width:980px;margin:20px auto;padding:0 16px}
  .card{background:#fafafa;padding:14px;border-radius:8px;border:1px solid #ddd}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn{background:#1976d2;color:#fff;border:0;padding:10px 16px;border-radius:6px;cursor:pointer}
  .error{background:#ffebee;color:#b71c1c;padding:10px;border-radius:6px;margin:12px 0}
  label{display:block;margin:8px 0 6px}
  .inline{display:inline-block;margin-right:10px}
  .small{font-size:12px;color:#555}
  input[type="number"]{width:100px}
  input[type="file"]{display:block}
  .hint{font-size:12px;color:#666}
  .mb8{margin-bottom:8px}
  .ml8{margin-left:8px}
  .total{font-size:13px;color:#333;margin-top:8px}
</style>
</head><body>
{% include '_header.html' %}
{% include '_menu.html' %}
{% include '_pdf_menu.html' %}
<div class="wrap">
  <h1>PDF Rotate</h1>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form id="rotateForm" method="post" enctype="multipart/form-data" class="card" action="{{ url_for('pdf_rotate') }}">
    <label>Select a PDF file:</label>
    <input type="file" id="pdfInput" name="pdf" accept="application/pdf" required>
    <div id="pageInfo" class="total">Total pages: <span id="totalPages">0</span></div>

    <label>Rotation angle:</label>
    <div class="row mb8">
      <label class="inline"><input type="radio" name="angle_preset" value="90" checked> 90°</label>
      <label class="inline"><input type="radio" name="angle_preset" value="180"> 180°</label>
      <label class="inline"><input type="radio" name="angle_preset" value="270"> 270°</label>
  <label class="inline"><input type="radio" name="angle_preset" value="custom"> Custom:</label>
  <input type="number" id="angleCustom" name="angle_custom" value="0" step="1" min="-359" max="359" disabled>
    </div>

    <label>Apply to:</label>
    <div class="row mb8">
      <label class="inline"><input type="radio" name="scope" value="all" checked> All pages</label>
      <label class="inline"><input type="radio" name="scope" value="ranges"> Page ranges</label>
      <input type="text" id="rangesInput" name="ranges" placeholder="e.g., 1-3,5,7-9" class="ml8" disabled>
    </div>
    <div class="small" id="selectedPreview">Selected: 0 pages</div>

    <div class="hint">Custom angle allows positive (clockwise) or negative (counterclockwise) degrees. Ranges are 1-based inclusive.</div>
    <button type="submit" id="rotateBtn" class="btn" style="margin-top:10px">Rotate and Download</button>
  </form>
</div>
<!-- PDF.js for client-side page counting -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" integrity="sha512-FfhK2s3C8l1Q28q6DvtXcZAn9lW3CEQ+MaY+jjmF0zcLsY0Jt8EQvYO2pwaZkb7yHq9nO4AnG83bbr2l7y5gGQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
  if (window['pdfjsLib']) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const pdfInput = document.getElementById('pdfInput');
  const totalPagesEl = document.getElementById('totalPages');
  const rotateForm = document.getElementById('rotateForm');
  const rotateBtn = document.getElementById('rotateBtn');
  const anglePresetRadios = Array.from(document.querySelectorAll('input[name="angle_preset"]'));
  const angleCustomInput = document.getElementById('angleCustom');
  async function updatePageCount(file){
    if (!file || !window['pdfjsLib']) { totalPagesEl.textContent = '0'; return; }
    try {
      const buf = await file.arrayBuffer();
      const loadingTask = pdfjsLib.getDocument({ data: buf });
      const pdf = await loadingTask.promise;
      totalPagesEl.textContent = String(pdf.numPages || 0);
    } catch (e) {
      console.warn('Failed to count pages:', e);
      totalPagesEl.textContent = '—';
    }
  }
  pdfInput.addEventListener('change', () => updatePageCount(pdfInput.files && pdfInput.files[0]));

  // Toggle ranges field based on scope
  const scopeRadios = Array.from(document.querySelectorAll('input[name="scope"]'));
  const rangesInput = document.getElementById('rangesInput');
  function refreshRangesState(){
    const scope = scopeRadios.find(r => r.checked)?.value;
    const useRanges = scope === 'ranges';
    rangesInput.disabled = !useRanges;
    rangesInput.placeholder = useRanges ? 'e.g., 1-3,5,7-9' : 'Ranges disabled (All pages)';
  }
  scopeRadios.forEach(r => r.addEventListener('change', refreshRangesState));
  refreshRangesState();

  // Toggle custom angle input based on preset selection
  function refreshAngleCustom(){
    const preset = anglePresetRadios.find(r => r.checked)?.value || '90';
    const useCustom = preset === 'custom';
    angleCustomInput.disabled = !useCustom;
    if (useCustom) {
      angleCustomInput.focus();
    }
  }
  anglePresetRadios.forEach(r => r.addEventListener('change', refreshAngleCustom));
  refreshAngleCustom();

  // Live selected pages preview
  const selectedPreview = document.getElementById('selectedPreview');
  function parseRanges(str){
    const out = [];
    if (!str) return out;
    const parts = str.split(',').map(s => s.trim()).filter(Boolean);
    for (const p of parts){
      const m = p.match(/^(\d+)(?:-(\d+))?$/);
      if (!m) continue;
      let a = parseInt(m[1],10), b = m[2] ? parseInt(m[2],10) : a;
      if (!Number.isFinite(a) || !Number.isFinite(b)) continue;
      if (a > b) { const t=a; a=b; b=t; }
      out.push([a,b]);
    }
    return out;
  }
  function summarizeSelection(total, scope, rangesStr){
    if (!Number.isFinite(total) || total <= 0){ selectedPreview.textContent = 'Selected: 0 pages'; return; }
    if (scope === 'all'){
      selectedPreview.textContent = `Selected: ${total} pages (1..${total})`;
      return;
    }
    const ranges = parseRanges(rangesStr);
    const sel = new Set();
    for (const [a,b] of ranges){
      const a0 = Math.max(1, Math.min(total, a));
      const b0 = Math.max(1, Math.min(total, b));
      for (let i=a0;i<=b0;i++) sel.add(i);
    }
    const arr = Array.from(sel).sort((x,y)=>x-y);
    const count = arr.length;
    function toRanges(nums){
      const res=[]; if (nums.length===0) return res;
      let s=nums[0], e=nums[0];
      for (let i=1;i<nums.length;i++){
        if (nums[i] === e+1){ e = nums[i]; }
        else { res.push([s,e]); s=nums[i]; e=nums[i]; }
      }
      res.push([s,e]);
      return res;
    }
    const rs = toRanges(arr);
    const compact = rs.slice(0,5).map(([s,e])=> s===e? `${s}` : `${s}-${e}`).join(', ');
    const more = rs.length > 5 ? '…' : '';
    selectedPreview.textContent = `Selected: ${count} page(s)` + (count? ` (${compact}${more})`:'');
  }
  function updateSelectionPreview(){
    const total = parseInt(totalPagesEl.textContent,10) || 0;
    const scope = scopeRadios.find(r => r.checked)?.value || 'all';
    const rangesStr = rangesInput.value || '';
    summarizeSelection(total, scope, rangesStr);
  }
  scopeRadios.forEach(r => r.addEventListener('change', updateSelectionPreview));
  rangesInput.addEventListener('input', updateSelectionPreview);
  const _origUpdatePageCount = updatePageCount;
  updatePageCount = async function(file){
    await _origUpdatePageCount(file);
    updateSelectionPreview();
  }
  updateSelectionPreview();

  // Client-side angle check for custom angle
  rotateForm.addEventListener('submit', (e) => {
    const preset = anglePresetRadios.find(r => r.checked)?.value || '90';
    if (preset === 'custom'){
      const val = parseInt(angleCustomInput.value, 10);
      if (!Number.isFinite(val) || (val % 90) !== 0){
        e.preventDefault();
        alert('Custom angle must be a multiple of 90.');
        return false;
      }
    }
    return true;
  });
</script>
</body></html>
